    implementation "org.apache.commons:commons-collections4:4.4"
    implementation "commons-io:commons-io:2.11.0"
    implementation "org.apache.commons:commons-compress:1.23.0"
    implementation "androidx.work:work-runtime:2.9.0"
    implementation "net.dongliu:apk-parser:2.6.10"
    implementation "org.jsoup:jsoup:1.17.2"
    
    // PdfiumAndroid - 免费开源PDF渲染库 (Google Pdfium)
    implementation("com.github.barteksc:pdfium-android:1.9.0") {
        exclude group: 'com.android.support'
    }
    
    // TBS SDK
    implementation files('libs/TbsFileSdk_base_universal_1.0.5.6000094.20250604183316.aar')
    
    // Bouncy Castle库，用于创建标准的X.509证书
    implementation "org.bouncycastle:bcpkix-jdk18on:1.76"
    implementation "org.bouncycastle:bcprov-jdk18on:1.76"
    
    // Easy Rules 规则引擎
    implementation "org.jeasy:easy-rules-core:4.1.0"
    implementation "org.jeasy:easy-rules-support:4.1.0"
    
    // Hilt 依赖注入框架
    implementation "com.google.dagger:hilt-android:2.48"
    annotationProcessor "com.google.dagger:hilt-compiler:2.48"
    
    // 解决依赖冲突
    configurations.all {
        // 排除旧版本的Bouncy Castle库，避免版本冲突
        exclude group: 'org.bouncycastle', module: 'bcprov-jdk15on'
        exclude group: 'org.bouncycastle', module: 'bcpkix-jdk15on'
        
        // 解决guava和listenablefuture的依赖冲突
        exclude group: 'com.google.guava', module: 'listenablefuture'
    }
    
    // 测试依赖
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.mockito:mockito-core:4.8.1"
    testImplementation "org.robolectric:robolectric:4.10.3"
    testImplementation "androidx.test:core:1.5.0"
    androidTestImplementation "androidx.test:core:1.5.0"
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    androidTestImplementation "org.mockito:mockito-android:4.8.1"
}