plugins {
    id "com.android.application" version "8.4.0"
    id "com.google.dagger.hilt.android" version "2.48"
}

// 配置资源处理
afterEvaluate {
    if (android?.applicationVariants) {
        android.applicationVariants.all { variant ->
            variant.mergeAssets.doLast {
                println "验证${variant.name}变体的assets目录..."
                def assetsDir = variant.mergeAssets.outputDir.get().asFile
                println "${variant.name}变体的assets目录: ${assetsDir.absolutePath}"
            }
        }
    }
}

android {
    namespace "com.oilquiz.app"
    compileSdk 34
    buildToolsVersion "34.0.0"

    defaultConfig {
        applicationId "com.oilquiz.app"
        minSdk 31
        targetSdk 34
        versionCode 2
        versionName "2.0"
        multiDexEnabled true
        
        // 注意：本地库构建已分离到msys2环境中进行
        // 请使用 build_llama_jni_msys2.sh 脚本在msys2中预编译本地库
        // 预编译后的.so文件应放在 src/main/jniLibs/ 目录下
        // externalNativeBuild {
        //     cmake {
        //         cppFlags "-std=c++17 -O3"
        //         arguments "-DANDROID_STL=c++_shared", "-GNinja", "-DCMAKE_MAKE_PROGRAM=D:\\quzp\\app\\ninja.exe", "-DANDROID_NDK=D:\\Android\\Sdk\\ndk\\26.1.10909125"
        //     }
        // }
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    packagingOptions {
        exclude "META-INF/DEPENDENCIES"
        exclude "META-INF/LICENSE"
        exclude "META-INF/LICENSE.txt"
        exclude "META-INF/NOTICE"
        exclude "META-INF/NOTICE.txt"
        exclude "META-INF/INDEX.LIST"
        exclude "META-INF/io.netty.versions.properties"
        exclude "mozilla/public-suffix-list.txt"
        exclude "**/org/tensorflow/lite/**/AndroidManifest.xml"
        exclude "**/tensorflow-lite/**/AndroidManifest.xml"
        exclude "**/tensorflow-lite-gpu/**/AndroidManifest.xml"
        exclude "**/tensorflow-lite-api/**/AndroidManifest.xml"
        pickFirst "**/libvulkan.so.*"
        pickFirst "**/libc++_shared.so"
        exclude "**/org/apache/commons/math3/**"
    }

    signingConfigs {
        release {
            storeFile file("smartquiz.keystore")
            storePassword "password"
            keyAlias "smartquiz"
            keyPassword "password"
        }
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
            applicationVariants.all {
                variant ->
                    variant.outputs.all {
                        outputFileName = "答题宝-debug-${variant.versionName}.apk"
                    }
            }
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
            applicationVariants.all {
                variant ->
                    variant.outputs.all {
                        outputFileName = "答题宝-release-${variant.versionName}.apk"
                    }
            }
        }
    }

    compileOptions {
        encoding 'UTF-8'
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
        disable "MissingTranslation"
    }

    buildFeatures {
        viewBinding true
        compose true
    }
    
    composeOptions {
        kotlinCompilerExtensionVersion "1.4.8"
    }
    // 本地库构建已分离到msys2环境中
    // 预编译的.so文件位于 src/main/jniLibs/
    // externalNativeBuild {
    //     cmake {
    //         path "src/main/cpp/CMakeLists.txt"
    //         version "3.22.1"
    //     }
    // }

    packagingOptions {
        exclude "META-INF/DEPENDENCIES"
        exclude "META-INF/LICENSE"
        exclude "META-INF/LICENSE.txt"
        exclude "META-INF/NOTICE"
        exclude "META-INF/NOTICE.txt"
        exclude "META-INF/INDEX.LIST"
        exclude "META-INF/io.netty.versions.properties"
        exclude "mozilla/public-suffix-list.txt"
        exclude "**/org/tensorflow/lite/**/AndroidManifest.xml"
        exclude "**/tensorflow-lite/**/AndroidManifest.xml"
        exclude "**/tensorflow-lite-gpu/**/AndroidManifest.xml"
        exclude "**/tensorflow-lite-api/**/AndroidManifest.xml"
        pickFirst "**/libvulkan.so.*"
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "com.google.android.material:material:1.12.0"
    implementation "androidx.constraintlayout:constraintlayout:2.1.4"
    implementation "androidx.recyclerview:recyclerview:1.3.2"
