<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量操作 - SmartQuiz</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .batch-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .batch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .batch-header h1 {
            font-size: 1.8rem;
            color: var(--primary);
        }
        
        .operation-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .operation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .operation-header h2 {
            font-size: 1.2rem;
            color: var(--text-dark);
        }
        
        .batch-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .batch-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-light);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .batch-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .batch-btn.delete {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        
        .batch-btn.delete:hover {
            background: #e74c3c;
            color: white;
        }
        
        .batch-btn.export {
            border-color: #3498db;
            color: #3498db;
        }
        
        .batch-btn.export:hover {
            background: #3498db;
            color: white;
        }
        
        .batch-btn.import {
            border-color: #27ae60;
            color: #27ae60;
        }
        
        .batch-btn.import:hover {
            background: #27ae60;
            color: white;
        }
        
        .item-list {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .list-header {
            background: var(--bg-light);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .select-all {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .list-header label {
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .item:hover {
            background: var(--bg-light);
        }
        
        .item:last-child {
            border-bottom: none;
        }
        
        .item-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-title {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        
        .item-details {
            font-size: 0.8rem;
            color: var(--text-medium);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--text-light);
        }
        
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-light);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="back-button" onclick="navigateTo('index.html')">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1>批量操作</h1>
        </header>
        
        <main class="batch-container">
            <div class="batch-header">
                <h1>批量操作</h1>
                <div class="filter-section">
                    <button class="filter-btn active" data-filter="questions">题目</button>
                    <button class="filter-btn" data-filter="quizzes">测验</button>
                    <button class="filter-btn" data-filter="notes">笔记</button>
                </div>
            </div>
            
            <div class="operation-section">
                <div class="operation-header">
                    <h2>选择操作</h2>
                    <div class="selected-count" id="selectedCount">
                        已选择: <span id="countValue">0</span> 项
                    </div>
                </div>
                
                <div class="batch-actions">
                    <button class="batch-btn delete" onclick="batchModule.batchDelete()">
                        <i class="fas fa-trash"></i> 批量删除
                    </button>
                    <button class="batch-btn export" onclick="batchModule.batchExport()">
                        <i class="fas fa-file-export"></i> 批量导出
                    </button>
                    <button class="batch-btn" onclick="batchModule.batchMove()">
                        <i class="fas fa-arrow-right"></i> 批量移动
                    </button>
                    <button class="batch-btn" onclick="batchModule.batchCopy()">
                        <i class="fas fa-copy"></i> 批量复制
                    </button>
                </div>
                
                <div class="item-list" id="itemList">
                    <div class="list-header">
                        <input type="checkbox" class="select-all" id="selectAll">
                        <label for="selectAll">全选</label>
                    </div>
                    <!-- 项目列表将通过JavaScript动态添加 -->
                </div>
                
                <div class="empty-state" id="emptyState">
                    <i class="fas fa-list"></i>
                    <p>暂无项目</p>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 SmartQuiz</p>
        </footer>
    </div>
    
    <script src="./js/script.js"></script>
    <script src="./js/pages/batch-operations.js"></script>
</body>
</html>
