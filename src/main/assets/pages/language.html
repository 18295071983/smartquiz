<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语言设置 - SmartQuiz</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SmartQuiz</h1>
            <button class="back-button" onclick="navigateTo('index.html')">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
        </header>
        
        <main>
            <section class="language-section">
                <h2>语言设置</h2>
                
                <div class="language-options">
                    <div class="language-card active" data-language="zh-CN">
                        <div class="language-flag">
                            <i class="fas fa-flag"></i>
                        </div>
                        <h3>简体中�?/h3>
                        <p>Chinese (Simplified)</p>
                    </div>
                    
                    <div class="language-card" data-language="en-US">
                        <div class="language-flag">
                            <i class="fas fa-flag-usa"></i>
                        </div>
                        <h3>English</h3>
                        <p>英语</p>
                    </div>
                    
                    <div class="language-card" data-language="zh-TW">
                        <div class="language-flag">
                            <i class="fas fa-flag"></i>
                        </div>
                        <h3>繁體中文</h3>
                        <p>Chinese (Traditional)</p>
                    </div>
                    
                    <div class="language-card" data-language="ja-JP">
                        <div class="language-flag">
                            <i class="fas fa-flag-japan"></i>
                        </div>
                        <h3>日本�?/h3>
                        <p>日语</p>
                    </div>
                    
                    <div class="language-card" data-language="ko-KR">
                        <div class="language-flag">
                            <i class="fas fa-flag-korea"></i>
                        </div>
                        <h3>한국�?/h3>
                        <p>韩语</p>
                    </div>
                    
                    <div class="language-card" data-language="fr-FR">
                        <div class="language-flag">
                            <i class="fas fa-flag-france"></i>
                        </div>
                        <h3>Français</h3>
                        <p>法语</p>
                    </div>
                </div>
                
                <div class="language-settings">
                    <h3>语言偏好</h3>
                    
                    <div class="settings-card">
                        <h4>界面语言</h4>
                        <p>选择应用的界面语言</p>
                        <div class="form-group">
                            <label for="interface-language">界面语言</label>
                            <select id="interface-language">
                                <option value="zh-CN">简体中�?/option>
                                <option value="en-US">English</option>
                                <option value="zh-TW">繁體中文</option>
                                <option value="ja-JP">日本�?/option>
                                <option value="ko-KR">한국�?/option>
                                <option value="fr-FR">Français</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="settings-card">
                        <h4>输入语言</h4>
                        <p>选择输入时的默认语言</p>
                        <div class="form-group">
                            <label for="input-language">输入语言</label>
                            <select id="input-language">
                                <option value="auto">自动检�?/option>
                                <option value="zh-CN">简体中�?/option>
                                <option value="en-US">English</option>
                                <option value="zh-TW">繁體中文</option>
                                <option value="ja-JP">日本�?/option>
                                <option value="ko-KR">한국�?/option>
                                <option value="fr-FR">Français</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="settings-card">
                        <h4>翻译设置</h4>
                        <label>
                            <input type="checkbox" id="enable-translation">
                            启用自动翻译
                        </label>
                        <label>
                            <input type="checkbox" id="enable-voice">
                            启用语音朗读
                        </label>
                        <div class="form-group">
                            <label for="translation-language">翻译目标语言</label>
                            <select id="translation-language">
                                <option value="zh-CN">简体中�?/option>
                                <option value="en-US">English</option>
                                <option value="zh-TW">繁體中文</option>
                                <option value="ja-JP">日本�?/option>
                                <option value="ko-KR">한국�?/option>
                                <option value="fr-FR">Français</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="language-actions">
                    <button id="save-language-btn" class="btn-primary">保存语言设置</button>
                    <button id="reset-language-btn" class="btn-secondary">恢复默认</button>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 SmartQuiz</p>
        </footer>
    </div>
    
    <script src="./js/script.js"></script>
</body>
</html>
