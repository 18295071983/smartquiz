<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试按钮 - SmartQuiz</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SmartQuiz</h1>
            <button class="back-button" onclick="navigateTo('index.html')">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
        </header>
        
        <main>
            <section class="test-section">
                <h2>测试按钮</h2>
                
                <div class="test-categories">
                    <div class="test-category">
                        <h3>功能测试</h3>
                        <div class="test-buttons">
                            <button id="test-localStorage" class="test-btn">
                                <i class="fas fa-database"></i> 测试LocalStorage
                            </button>
                            <button id="test-sessionStorage" class="test-btn">
                                <i class="fas fa-sync-alt"></i> 测试SessionStorage
                            </button>
                            <button id="test-api" class="test-btn">
                                <i class="fas fa-server"></i> 测试API
                            </button>
                            <button id="test-notification" class="test-btn">
                                <i class="fas fa-bell"></i> 测试通知
                            </button>
                        </div>
                    </div>
                    
                    <div class="test-category">
                        <h3>UI测试</h3>
                        <div class="test-buttons">
                            <button id="test-theme" class="test-btn">
                                <i class="fas fa-palette"></i> 测试主题切换
                            </button>
                            <button id="test-animation" class="test-btn">
                                <i class="fas fa-spinner"></i> 测试动画效果
                            </button>
                            <button id="test-responsive" class="test-btn">
                                <i class="fas fa-mobile-alt"></i> 测试响应式布局
                            </button>
                            <button id="test-toast" class="test-btn">
                                <i class="fas fa-bullhorn"></i> 测试消息提示
                            </button>
                        </div>
                    </div>
                    
                    <div class="test-category">
                        <h3>性能测试</h3>
                        <div class="test-buttons">
                            <button id="test-memory" class="test-btn">
                                <i class="fas fa-microchip"></i> 测试内存使用
                            </button>
                            <button id="test-speed" class="test-btn">
                                <i class="fas fa-tachometer-alt"></i> 测试执行速度
                            </button>
                            <button id="test-load" class="test-btn">
                                <i class="fas fa-weight-hanging"></i> 测试加载性能
                            </button>
                        </div>
                    </div>
                    
                    <div class="test-category">
                        <h3>错误测试</h3>
                        <div class="test-buttons">
                            <button id="test-error" class="test-btn">
                                <i class="fas fa-exclamation-triangle"></i> 测试错误处理
                            </button>
                            <button id="test-exception" class="test-btn">
                                <i class="fas fa-bug"></i> 测试异常捕获
                            </button>
                            <button id="test-network-error" class="test-btn">
                                <i class="fas fa-wifi"></i> 测试网络错误
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="test-results">
                    <h3>测试结果</h3>
                    <div id="test-result-container" class="result-container">
                        <p class="no-results">点击上方按钮开始测�?/p>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 SmartQuiz</p>
        </footer>
    </div>
    
    <script src="./js/script.js"></script>
</body>
</html>
