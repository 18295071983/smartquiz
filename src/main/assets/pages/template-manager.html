<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模板管理 - SmartQuiz</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .template-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .template-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .template-header h1 {
            font-size: 1.8rem;
            color: var(--primary);
        }
        
        .add-template-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        
        .add-template-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .template-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .template-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
        }
        
        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .template-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        
        .template-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .template-description {
            font-size: 0.9rem;
            color: var(--text-medium);
            margin-bottom: 15px;
            text-align: center;
        }
        
        .template-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .template-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-light);
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
        }
        
        .template-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .template-btn.delete {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        
        .template-btn.delete:hover {
            background: #e74c3c;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            font-size: 1.5rem;
            color: var(--text-dark);
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-dark);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-dark);
            border: 1px solid var(--border);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="back-button" onclick="navigateTo('index.html')">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1>模板管理</h1>
        </header>
        
        <main class="template-container">
            <div class="template-header">
                <h1>模板管理</h1>
                <button class="add-template-btn" onclick="openAddTemplateModal()">
                    <i class="fas fa-plus"></i> 添加模板
                </button>
            </div>
            
            <div class="template-list" id="templateList">
                <!-- 模板卡片将通过JavaScript动态添加 -->
            </div>
            
            <div class="empty-state" id="emptyState">
                <i class="fas fa-file-alt"></i>
                <p>暂无模板</p>
                <p>点击上方按钮添加模板</p>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 SmartQuiz</p>
        </footer>
    </div>
    
    <!-- 添加/编辑模板模态框 -->
    <div class="modal" id="templateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加模板</h2>
                <button class="close-btn" onclick="closeTemplateModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="templateForm">
                <input type="hidden" id="templateId">
                <div class="form-group">
                    <label for="templateName">模板名称</label>
                    <input type="text" id="templateName" required>
                </div>
                <div class="form-group">
                    <label for="templateDescription">模板描述</label>
                    <textarea id="templateDescription"></textarea>
                </div>
                <div class="form-group">
                    <label for="templateType">模板类型</label>
                    <select id="templateType">
                        <option value="excel">Excel</option>
                        <option value="json">JSON</option>
                        <option value="csv">CSV</option>
                        <option value="word">Word</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeTemplateModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="./js/script.js"></script>
    <script src="./js/pages/template-manager.js"></script>
</body>
</html>
