﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQuiz</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 增强的样式 */
        .category {
            margin-bottom: 30px;
        }
        
        .category h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .category h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }
        
        .card-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        
        .card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .card {
                padding: 15px;
            }
            
            .card-icon {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SmartQuiz</h1>
        </header>
        
        <main>
            <!-- 学习管理类别 -->
            <section class="category">
                <h2>学习管理</h2>
                <div class="card-grid">
                    <div class="card" onclick="navigateTo('question.html')">
                        <div class="card-icon">
                            <i class="fas fa-question-circle"></i>
                        </div>
                        <h3>题目管理</h3>
                    </div>
                    <div class="card" onclick="navigateTo('quiz.html')">
                        <div class="card-icon">
                            <i class="fas fa-pencil-alt"></i>
                        </div>
                        <h3>开始测验</h3>
                    </div>
                    <div class="card" onclick="navigateTo('study-plan.html')">
                        <div class="card-icon">
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                        <h3>学习计划</h3>
                    </div>
                    <div class="card" onclick="navigateTo('wrong-question.html')">
                        <div class="card-icon">
                            <i class="fas fa-times-circle"></i>
                        </div>
                        <h3>错题集</h3>
                    </div>
                    <div class="card" onclick="navigateTo('history.html')">
                        <div class="card-icon">
                            <i class="fas fa-history"></i>
                        </div>
                        <h3>历史记录</h3>
                    </div>
                    <div class="card" onclick="navigateTo('statistics.html')">
                        <div class="card-icon">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                        <h3>统计分析</h3>
                    </div>
                </div>
            </section>
            
            <!-- 工具类别 -->
            <section class="category">
                <h2>工具</h2>
                <div class="card-grid">
                    <div class="card" onclick="navigateTo('ocr.html')">
                        <div class="card-icon">
                            <i class="fas fa-eye"></i>
                        </div>
                        <h3>OCR识别</h3>
                    </div>
                    <div class="card" onclick="navigateTo('ai-chat.html')">
                        <div class="card-icon">
                            <i class="fas fa-robot"></i>
                        </div>
                        <h3>AI助手</h3>
                    </div>
                    <div class="card" onclick="navigateTo('import.html')">
                        <div class="card-icon">
                            <i class="fas fa-file-import"></i>
                        </div>
                        <h3>导入文件</h3>
                    </div>
                    <div class="card" onclick="navigateTo('export.html')">
                        <div class="card-icon">
                            <i class="fas fa-file-export"></i>
                        </div>
                        <h3>数据导出</h3>
                    </div>
                    <div class="card" onclick="navigateTo('note.html')">
                        <div class="card-icon">
                            <i class="fas fa-sticky-note"></i>
                        </div>
                        <h3>学习笔记</h3>
                    </div>
                    <div class="card" onclick="navigateTo('backup.html')">
                        <div class="card-icon">
                            <i class="fas fa-database"></i>
                        </div>
                        <h3>数据备份</h3>
                    </div>
                    <div class="card" onclick="navigateTo('file-preview.html')">
                        <div class="card-icon">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <h3>文件预览</h3>
                    </div>
                    <div class="card" onclick="navigateTo('logs.html')">
                        <div class="card-icon">
                            <i class="fas fa-file-lines"></i>
                        </div>
                        <h3>运行日志</h3>
                    </div>
                    <div class="card" onclick="navigateTo('webview.html')">
                        <div class="card-icon">
                            <i class="fas fa-globe"></i>
                        </div>
                        <h3>WebView</h3>
                    </div>
                    <div class="card" onclick="navigateTo('template-manager.html')">
                        <div class="card-icon">
                            <i class="fas fa-file-template"></i>
                        </div>
                        <h3>模板管理</h3>
                    </div>
                    <div class="card" onclick="navigateTo('batch-operations.html')">
                        <div class="card-icon">
                            <i class="fas fa-layer-group"></i>
                        </div>
                        <h3>批量操作</h3>
                    </div>
                </div>
            </section>
            
            <!-- 设置类别 -->
            <section class="category">
                <h2>设置</h2>
                <div class="card-grid">
                    <div class="card" onclick="navigateTo('user.html')">
                        <div class="card-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <h3>用户管理</h3>
                    </div>
                    <div class="card" onclick="navigateTo('login.html')">
                        <div class="card-icon">
                            <i class="fas fa-sign-in-alt"></i>
                        </div>
                        <h3>登录</h3>
                    </div>
                    <div class="card" onclick="navigateTo('register.html')">
                        <div class="card-icon">
                            <i class="fas fa-user-plus"></i>
                        </div>
                        <h3>注册</h3>
                    </div>
                    <div class="card" onclick="navigateTo('backup.html')">
                        <div class="card-icon">
                            <i class="fas fa-save"></i>
                        </div>
                        <h3>数据备份</h3>
                    </div>
                    <div class="card" onclick="navigateTo('theme.html')">
                        <div class="card-icon">
                            <i class="fas fa-palette"></i>
                        </div>
                        <h3>主题设置</h3>
                    </div>
                    <div class="card" onclick="navigateTo('language.html')">
                        <div class="card-icon">
                            <i class="fas fa-language"></i>
                        </div>
                        <h3>语言设置</h3>
                    </div>
                </div>
            </section>
            
            <!-- 测试类别 -->
            <section class="category">
                <h2>测试</h2>
                <div class="card-grid">
                    <div class="card" onclick="navigateTo('environment.html')">
                        <div class="card-icon">
                            <i class="fas fa-microchip"></i>
                        </div>
                        <h3>环境检测</h3>
                    </div>
                    <div class="card" onclick="navigateTo('test.html')">
                        <div class="card-icon">
                            <i class="fas fa-vial"></i>
                        </div>
                        <h3>测试按钮</h3>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 SmartQuiz</p>
        </footer>
    </div>
    
    <script src="./js/script.js"></script>
</body>
</html>
