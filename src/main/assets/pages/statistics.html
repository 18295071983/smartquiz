<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - SmartQuiz</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .statistics-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .stats-header h1 {
            font-size: 1.8rem;
            color: var(--primary);
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .stat-card-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        
        .stat-card-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        
        .stat-card-label {
            font-size: 0.9rem;
            color: var(--text-medium);
        }
        
        .chart-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .chart-header h2 {
            font-size: 1.2rem;
            color: var(--text-dark);
        }
        
        .chart-container {
            height: 300px;
            position: relative;
        }
        
        .progress-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .progress-item {
            margin-bottom: 20px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .progress-label {
            font-size: 0.9rem;
            color: var(--text-medium);
        }
        
        .progress-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-light);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        @media (max-width: 768px) {
            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .stat-card-value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="back-button" onclick="navigateTo('index.html')">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1>统计分析</h1>
        </header>
        
        <main class="statistics-container">
            <div class="stats-header">
                <h1>学习数据</h1>
                <div class="date-selector">
                    <select id="dateRange">
                        <option value="week">本周</option>
                        <option value="month" selected>本月</option>
                        <option value="year">本年</option>
                        <option value="all">全部</option>
                    </select>
                </div>
            </div>
            
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-card-icon">
                        <i class="fas fa-pencil-alt"></i>
                    </div>
                    <div class="stat-card-value" id="totalQuizzes">0</div>
                    <div class="stat-card-label">总测验次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-card-value" id="totalCorrect">0</div>
                    <div class="stat-card-label">正确题目数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-card-value" id="totalTime">0</div>
                    <div class="stat-card-label">学习时长(分钟)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon">
                        <i class="fas fa-percentage"></i>
                    </div>
                    <div class="stat-card-value" id="accuracyRate">0%</div>
                    <div class="stat-card-label">正确率</div>
                </div>
            </div>
            
            <div class="chart-section">
                <div class="chart-header">
                    <h2>测验趋势</h2>
                    <div class="chart-type">
                        <select id="chartType">
                            <option value="line">折线图</option>
                            <option value="bar">柱状图</option>
                        </select>
                    </div>
                </div>
                <div class="chart-container" id="trendChart">
                    <!-- 图表将通过JavaScript动态添加 -->
                </div>
            </div>
            
            <div class="progress-section">
                <h2>学习进度</h2>
                <div class="progress-item">
                    <div class="progress-header">
                        <span class="progress-label">知识点掌握</span>
                        <span class="progress-value" id="knowledgeProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="knowledgeFill"></div>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="progress-header">
                        <span class="progress-label">学习计划完成</span>
                        <span class="progress-value" id="planProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="planFill"></div>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="progress-header">
                        <span class="progress-label">错题复习</span>
                        <span class="progress-value" id="reviewProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="reviewFill"></div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 SmartQuiz</p>
        </footer>
    </div>
    
    <script src="./js/script.js"></script>
    <script src="./js/pages/statistics.js"></script>
</body>
</html>
